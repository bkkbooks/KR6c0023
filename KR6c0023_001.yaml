body:
  text: 姚秦天竺三藏鳩摩羅什譯如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘衆千二百五十人俱爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐時長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付囑諸菩薩世尊善男子善女人發阿耨多羅三藐三菩提心應云何住云何降伏其心佛言善哉善哉須菩提如汝所説如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝説善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心唯然世尊願樂欲聞佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相何以故若菩薩不住相布施其福德不可思量須菩提於意云何東方虛空可思量不不也世尊須菩提南西北方四維上下虛空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量須菩提菩薩但應如所教住須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所説身相即非身相佛告須菩提凡所有相皆是虛妄若見諸相非相則見如來須菩提白佛言世尊頗有衆生得聞如是言説章句生實信不佛告須菩提莫作是説如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相何以故是諸衆生若心取相則為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相即著我人衆生壽者是故不應取法不應取非法以是義故如來常説汝等比丘知我説法如筏喻者法尚應捨何況非法須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所説法耶須菩提言如我解佛所説義無有定法名阿耨多羅三藐三菩提亦無有定法如來可説何以故如來所説法皆不可取不可説非法非非法所以者何一切賢聖皆以無為法而有差別須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來説福德多若復有人於此經中受持乃至四句偈等為他人説其福勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無來是故名阿那含須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者世尊佛説我得無諍三昧人中最為第一是第一離欲阿羅漢我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊則不説須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行佛告須菩提於意云何如來昔在然燈佛所於法有所得不世尊如來在然燈佛所於法實無所得須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者則非莊嚴是名莊嚴是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛説非身是名大身須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人説而此福德勝前福德復次須菩提隨説是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處則為有佛若尊重弟子爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛説般若波羅蜜則非般若波羅蜜須菩提於意云何如來有所説法不須菩提白佛言世尊如來無所説須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來説非微塵是名微塵如來説世界非世界是名世界須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來説三十二相即是非相是名三十二相須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人説其福甚多爾時須菩提聞説是經深解義趣涕淚悲泣而白佛言希有世尊佛説如是甚深經典我從昔來所得慧眼未曾得聞如是之經世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德世尊是實相者則是非相是故如來説名實相世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人則為第一希有何以故此人無我相人相衆生相壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相則名諸佛佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有何以故須菩提如來説第一波羅蜜非第一波羅蜜是名第一波羅蜜須菩提忍辱波羅蜜如來説非忍辱波羅蜜何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住則為非住是故佛説菩薩心不應住色布施須菩提菩薩為利益一切衆生應如是布施如來説一切諸相即是非相又説一切衆生則非衆生須菩提如來是真語者實語者如語者不誑語者不異語者須菩提如來所得法此法無實無虛須菩提若菩薩心住於法而行布施如人入暗則無所見若菩薩心不住法而行布施如人有目日光明照見種種色須菩提當來之世若有善男子善女人能於此經受持讀誦則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解説須菩提以要言之是經有不可思議不可稱量無邊功德如來為發大乘者説為發最上乘者説若有人能受持讀誦廣為人説如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提何以故須菩提若樂小法者著我見人見衆生見壽者見則於此經不能聽受讀誦為人解説須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具説者或有人聞心則狂亂狐疑不信須菩提當知是經義不可思議果報亦不可思議爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提善男子善女人發阿耨多羅三藐三菩提者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者何以故須菩提若菩薩有我相人相衆生相壽者相則非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提者須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所説義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我受記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我受記作是言汝於來世當得作佛號釋迦牟尼何以故如來者即諸法如義若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虛是故如來説一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法須菩提譬如人身長大須菩提言世尊如來説人身長大則為非大身是名大身須菩提菩薩亦如是若作是言我當滅度無量衆生則不名菩薩何以故須菩提實無有法名為菩薩是故佛説一切法無我無人無衆生無壽者須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來説莊嚴佛土者即非莊嚴是名莊嚴須菩提若菩薩通達無我法者如來説名真是菩薩須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼須菩提於意云何恆河中所有沙佛説是沙不如是世尊如來説是沙須菩提於意云何如一恆河中所有沙有如是等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來説諸心皆為非心是名為心所以者何須菩提過去心不可得現在心不可得未來心不可得須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不説得福德多以福德無故如來説得福德多須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來説具足色身即非具足色身是名具足色身須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來説諸相具足即非具足是名諸相具足須菩提汝勿謂如來作是念我當有所説法莫作是念何以故若人言如來有所説法即為謗佛不能解我所説故須菩提説法者無法可説是名説法爾時慧命須菩提白佛言世尊頗有衆生於未來世聞説是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來説非衆生是名衆生須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提須菩提所言善法者如來説非善法是名善法須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人説於前福德百分不及一百千萬億分乃至算數譬喻所不能及須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者若有衆生如來度者如來則有我人衆生壽者須菩提如來説有我者則非有我而凡夫之人以為有我須菩提凡夫者如來説則非凡夫須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王則是如來須菩提白佛言世尊如我解佛所説義不應以三十二相觀如來爾時世尊而説偈言若以色見我以音聲求我是人行邪道不能見如來須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提者説諸法斷滅相莫作是念何以故發阿耨多羅三藐三菩提心者於法不説斷滅相須菩提若菩薩以滿恆河沙等世界七寶布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故説不受福德須菩提若有人言如來若來若去若坐若臥是人不解我所説義何以故如來者無所從來亦無所去故名如來須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不甚多世尊何以故若是微塵衆實有者佛則不説是微塵衆所以者何佛説微塵衆則非微塵衆是名微塵衆世尊如來所説三千大千世界則非世界是名世界何以故若世界實有者則是一合相如來説一合相則非一合相是名一合相須菩提一合相者則是不可説但凡夫之人貪著其事須菩提若人言佛説我見人見衆生見壽者見須菩提於意云何是人解我所説義不世尊是人不解如來所説義何以故世尊説我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來説即非法相是名法相須菩提若有人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演説其福勝彼云何為人演説不取於相如如不動何以故一切有為法如夢幻泡影如露亦如電應作如是觀佛説是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所説皆大歡喜信受奉行真言那謨婆伽跋帝鉢喇壤波羅弭多曳唵伊利底伊室利輸盧馱毗舍耶毗舍耶莎婆訶
